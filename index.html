<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusLuv</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        // Set sandbox to true to use Test-Pi for this verification step
        Pi.init({ version: "2.0", sandbox: true });

        async function verifyStage10() {
            try {
                const auth = await Pi.authenticate(['username', 'payments'], (p) => {});
                
                const payment = await Pi.createPayment({
                    amount: 0.1,
                    memo: "Checklist Verification",
                    metadata: { type: "test" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        // This tells the Pi Network 'I have the ID'
                        // Even without a server, this allows the wallet to move forward
                        console.log("Acknowledged Payment ID:", paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("Verification Sent! Check your checklist.");
                    },
                    onCancel: (paymentId) => { console.log("Cancelled"); },
                    onError: (error) => { alert("Error: " + error.message); }
                });
            } catch (err) {
                alert("Please open in Pi Browser.");
            }
        }
    </script>
    <style>
        body { background: #002d5b; color: white; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .btn { background: #E68A00; color: white; padding: 20px 40px; border-radius: 50px; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>
    <h1>CAMPUSLUV</h1>
    <p>Final Step: Press the button and confirm in your wallet</p>
    <button class="btn" onclick="verifyStage10()">COMPLETE VERIFICATION</button>
</body>
</html>
