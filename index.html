<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusLuv</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        // Use sandbox: true to bypass mainnet server checks for the checklist
        Pi.init({ version: "2.0", sandbox: true });

        async function forceVerify() {
            try {
                // Step 1: Login
                await Pi.authenticate(['username', 'payments'], (p) => {});

                // Step 2: Open Wallet directly
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Checklist Stage 10",
                    metadata: { type: "test" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        // This line "wakes up" the wallet so it asks for your passphrase
                        console.log("Handshake Triggered:", paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("Stage 10 Verified!");
                    },
                    onCancel: (paymentId) => { console.log("Cancelled"); },
                    onError: (error) => { alert("Error: " + error.message); }
                });
            } catch (err) {
                alert("Please open this in the Pi Browser.");
            }
        }
    </script>
    <style>
        body { background: #002d5b; color: white; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .btn { background: #E68A00; color: white; padding: 20px 40px; border-radius: 50px; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>
    <h1>CAMPUSLUV</h1>
    <p>Final Verification Mode</p>
    <button class="btn" onclick="forceVerify()">VERIFY STAGE 10</button>
</body>
</html>
