<!DOCTYPE html>
<html>
<head>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: false });
        async function finishChecklist() {
            try {
                await Pi.authenticate(['username', 'payments'], (p) => {});
                await Pi.createPayment({
                    amount: 0.1,
                    memo: "Final Stage 10",
                    metadata: { stage: "10" }
                }, {
                    onReadyForServerApproval: async (paymentId) => {
                        await fetch('/api/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId })
                        });
                    },
                    onReadyForServerCompletion: async (paymentId, txid) => {
                        await fetch('/api/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, txid })
                        });
                        alert("CHECKLIST SUCCESSFUL!");
                    },
                    onCancel: (id) => console.log("Cancelled"),
                    onError: (err) => alert("Error: " + err.message)
                });
            } catch (e) { alert(e.message); }
        }
    </script>
</head>
<body style="background:#002d5b; color:white; text-align:center; padding-top:100px;">
    <h1>CAMPUSLUV</h1>
    <button onclick="finishChecklist()" style="padding:20px; border-radius:50px; background:#E68A00; color:white; font-weight:bold; border:none; cursor:pointer;">VERIFY FINAL STEP</button>
</body>
</html>
