<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusLuv</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f9; }
        .container { max-width: 400px; margin: auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; margin-top: 20px; transition: 0.3s; }
        #login-btn { background: #673ab7; color: white; }
        #pay-btn { background: #ff9800; color: white; display: none; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="container">
        <h1>CampusLuv</h1>
        <div id="user-info">Connecting students globally...</div>
        
        <button id="login-btn">Login with Pi</button>
        <button id="pay-btn">Pay 1 Pi</button>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        // THE FIX: Automatically clears the "Pending Action" error
        async function onIncompletePaymentFound(payment) {
            console.log("Clearing stuck payment...");
            await fetch('/api/complete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId: payment.identifier, txid: payment.transaction.txid })
            });
        };

        // Authenticate User
        async function auth() {
            try {
                const auth = await Pi.authenticate(['payments', 'username'], onIncompletePaymentFound);
                document.getElementById('user-info').innerHTML = `<h3>Welcome, ${auth.user.username}!</h3>`;
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('pay-btn').style.display = 'inline-block';
            } catch (err) {
                console.error("Auth failed:", err);
            }
        }

        // Trigger Payment Wallet
        async function createPayment() {
            try {
                const paymentData = {
                    amount: 1.0,
                    memo: "Test Payment for CampusLuv",
                    metadata: { type: "test_payment" }
                };

                const callbacks = {
                    onReadyForServerApproval: (paymentId) => {
                        fetch('/api/approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId })
                        });
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        fetch('/api/complete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, txid })
                        });
                    },
                    onCancel: (paymentId) => console.log("User cancelled"),
                    onError: (error) => console.error("Payment error:", error)
                };

                await Pi.createPayment(paymentData, callbacks);
            } catch (err) {
                console.error("Payment trigger failed:", err);
            }
        }

        document.getElementById('login-btn').addEventListener('click', auth);
        document.getElementById('pay-btn').addEventListener('click', createPayment);
    </script>
</body>
</html>
