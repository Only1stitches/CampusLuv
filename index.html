<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusLuv</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        // Initializing with your specific App ID
        Pi.init({ version: "2.0", sandbox: false });

        async function authenticateAndPay() {
            try {
                // Step 1: Login the user to create a session
                const scopes = ['username', 'payments'];
                function onIncompletePaymentFound(payment) { /* Handle if needed */ }
                
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                console.log("Logged in as: " + auth.user.username);

                // Step 2: Trigger the payment now that user is verified
                await Pi.createPayment({
                    amount: 0.1, 
                    memo: "Checklist Verification for CampusLuv",
                    metadata: { type: "checklist_test" },
                }, {
                    onReadyForServerApproval: (id) => console.log("Approved ID:", id),
                    onReadyForServerCompletion: (id, txid) => alert("Success! Checklist Stage 10 Completed."),
                    onCancel: (id) => console.log("Payment Cancelled"),
                    onError: (err) => alert("Wallet Error: " + err.message)
                });
            } catch (err) {
                alert("Auth Error: Please open this in the Pi Browser.");
            }
        }
    </script>
    <style>
        body { 
            background: #002d5b; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center; 
        }
        .logo-text { font-size: 3rem; font-weight: bold; background: linear-gradient(to right, #E68A00, #9b2d60); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .btn { background: #E68A00; color: white; padding: 15px 40px; border: none; border-radius: 30px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="logo-text">CAMPUSLUV</div>
    <p>Students' World: Learn • Connect • Earn • Live</p>
    
    <button class="btn" onclick="authenticateAndPay()">
        Complete Stage 10
    </button>

    <div style="position:fixed; bottom:20px; font-size:0.7rem; opacity:0.5;">
        App ID: 8c3947f0a1b768c2 | Subdomain: campusluv4713
    </div>
</body>
</html>
