<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusLuv</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        Pi.init({ version: "2.0", sandbox: false });

        async function verifyNow() {
            try {
                // 1. Authenticate first
                const auth = await Pi.authenticate(['username', 'payments'], (p) => {});
                
                // 2. Create the payment
                const payment = await Pi.createPayment({
                    amount: 0.01,
                    memo: "Checklist Stage 10",
                    metadata: { type: "test" }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        // This is the critical missing link. 
                        // It tells the portal the app 'received' the request.
                        console.log("Payment ID received:", paymentId);
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        alert("Success! Check your portal now.");
                    },
                    onCancel: (paymentId) => { console.log("Cancelled"); },
                    onError: (error) => { alert("Error: " + error.message); }
                });
            } catch (err) {
                alert("Auth failed. Open this in Pi Browser.");
            }
        }
    </script>
</head>
<body style="background:#002d5b; color:white; text-align:center; padding-top:100px; font-family:sans-serif;">
    <h1>CAMPUSLUV</h1>
    <p>Status: Ready for Stage 10</p>
    <button onclick="verifyNow()" style="background:#E68A00; color:white; padding:20px; border-radius:50px; border:none; font-weight:bold;">
        CLICK TO VERIFY NOW
    </button>
</body>
</html>
